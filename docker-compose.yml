# ============================================================
# Med-SEAL Suite — OpenEMR + Medplum + AI Services
# ============================================================
# Architecture:
#   OpenEMR (Clinical EMR) → FHIR R4 → Medplum (FHIR Store) → AI Services
# ============================================================

services:

  # ==================== LAYER 0: Nginx Gateway ====================
  gateway:
    image: nginx:alpine
    container_name: medseal-gateway
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./gateway/certs:/etc/nginx/certs:ro
    restart: unless-stopped
    networks:
      - medseal-net
    depends_on:
      - ai-frontend
      - cdss
      - openemr
      - medplum-server
      - medplum-app
      - ai-service

  # ==================== LAYER 2: Medplum (FHIR R4 API) ====================
  medplum-db:
    image: postgres:16-alpine
    container_name: medseal-medplum-db
    environment:
      POSTGRES_DB: medplum
      POSTGRES_USER: medplum
      POSTGRES_PASSWORD: ${MEDPLUM_DB_PASSWORD:-changeme}
    volumes:
      - medplum-db-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    restart: unless-stopped
    networks:
      - medseal-net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U medplum" ]
      interval: 5s
      timeout: 5s
      retries: 5

  medplum-redis:
    image: redis:7-alpine
    container_name: medseal-medplum-redis
    ports:
      - "6380:6379"
    restart: unless-stopped
    networks:
      - medseal-net
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5

  medplum-server:
    image: medplum/medplum-server:latest
    platform: linux/amd64
    container_name: medseal-medplum-server
    ports:
      - "8103:8103"
    depends_on:
      medplum-db:
        condition: service_healthy
      medplum-redis:
        condition: service_healthy
    volumes:
      - ./medplum/medplum.config.json:/usr/src/medplum/medplum.config.json:ro
      - medplum-binary:/usr/src/medplum/packages/server/binary
    restart: unless-stopped
    networks:
      - medseal-net
    healthcheck:
      test: [ "CMD", "node", "-e", "fetch('http://localhost:8103/healthcheck').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))" ]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 120s

  medplum-app:
    image: medplum/medplum-app:latest
    platform: linux/amd64
    container_name: medseal-medplum-app
    ports:
      - "3000:3000"
    depends_on:
      medplum-server:
        condition: service_healthy
    environment:
      - MEDPLUM_BASE_URL=https://fhir.med-seal.org/
    restart: unless-stopped
    networks:
      - medseal-net

  # ==================== LAYER 1: OpenEMR (Clinical EMR) ====================
  openemr-db:
    image: mariadb:10.11
    container_name: medseal-openemr-db
    environment:
      MARIADB_ROOT_PASSWORD: ${OPENEMR_DB_ROOT_PASSWORD:-changeme}
      MARIADB_DATABASE: openemr
      MARIADB_USER: openemr
      MARIADB_PASSWORD: ${OPENEMR_DB_PASSWORD:-changeme}
    volumes:
      - openemr-db-data:/var/lib/mysql
    ports:
      - "3307:3306"
    restart: unless-stopped
    networks:
      - medseal-net
    healthcheck:
      test: [ "CMD", "healthcheck.sh", "--connect", "--innodb_initialized" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  openemr:
    image: openemr/openemr:7.0.2
    container_name: medseal-openemr
    ports:
      - "8081:80" # OpenEMR Web UI
      - "8080:443" # OpenEMR HTTPS
    depends_on:
      openemr-db:
        condition: service_healthy
    environment:
      MYSQL_HOST: openemr-db
      MYSQL_ROOT_PASS: ${OPENEMR_DB_ROOT_PASSWORD:-changeme}
      MYSQL_USER: openemr
      MYSQL_PASS: ${OPENEMR_DB_PASSWORD:-changeme}
      MYSQL_DATABASE: openemr
      OE_USER: admin
      OE_PASS: ${OPENEMR_ADMIN_PASSWORD:-changeme}
    volumes:
      - openemr-sites:/var/www/localhost/htdocs/openemr/sites
      - openemr-logs:/var/log
      - ./openemr/custom/ai-chat-widget.js:/opt/medseal/ai-chat-widget.js:ro
      - ./openemr/custom/ai-chat-widget.css:/opt/medseal/ai-chat-widget.css:ro
      - ./openemr/custom/medseal-theme.css:/opt/medseal/medseal-theme.css:ro
      - ./openemr/custom/inject-theme.sh:/opt/medseal/inject-theme.sh:ro
      - ./apps/openemr/custom-modules/medseal-chat/medseal_chat_api.php:/var/www/localhost/htdocs/openemr/interface/modules/custom_modules/medseal-chat/medseal_chat_api.php
    restart: unless-stopped
    networks:
      - medseal-net
    healthcheck:
      test: [ "CMD-SHELL", "curl -kf http://localhost:80/ || exit 1" ]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s

  # ==================== LAYER 4: AI Services ====================
  sso-db:
    image: postgres:16-alpine
    container_name: medseal-sso-db
    environment:
      POSTGRES_DB: medseal_sso
      POSTGRES_USER: sso
      POSTGRES_PASSWORD: ${SSO_DB_PASSWORD:-changeme}
    volumes:
      - sso-db-data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    restart: unless-stopped
    networks:
      - medseal-net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U sso -d medseal_sso" ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  ai-service:
    build:
      context: ./apps/ai-service
      dockerfile: Dockerfile
    container_name: medseal-ai-service
    ports:
      - "4003:4003"
    depends_on:
      medplum-server:
        condition: service_healthy
      sso-db:
        condition: service_healthy
      openemr-db:
        condition: service_started
    environment:
      # LLM Configuration — OpenRouter Fallback
      LLM_API_URL: https://openrouter.ai/api/v1/chat/completions
      LLM_API_KEY: "${LLM_API_KEY:-}"
      LLM_MODEL: google/gemini-2.5-flash
      LLM_TEMPERATURE: "0.3"
      LLM_MAX_TOKENS: "2048"
      AI_SERVICE_PORT: "4003"
      AUDIT_DATA_DIR: /data
      # SSO Database
      SSO_DB_URL: postgres://sso:${SSO_DB_PASSWORD:-changeme}@sso-db:5432/medseal_sso
      # OpenEMR MySQL Database
      OPENEMR_DB_HOST: openemr-db
      OPENEMR_DB_PORT: "3306"
      OPENEMR_DB_USER: openemr
      OPENEMR_DB_PASS: ${OPENEMR_DB_PASSWORD:-changeme}
      OPENEMR_DB_NAME: openemr
      # SSO — OpenEMR external URL for browser redirect
      OPENEMR_EXTERNAL_URL: https://emr.med-seal.org
      # CDSS external URL for SSO redirect
      CDSS_EXTERNAL_URL: https://cdss.med-seal.org
      # Med-SEAL-Agent (multi-agent orchestrator)
      AGENT_BASE_URL: http://172.17.0.1:8000
      # Internal service URLs (within Docker network)
      MEDPLUM_BASE_URL: http://medplum-server:8103
    volumes:
      - audit-data:/data
    restart: unless-stopped
    networks:
      - medseal-net
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:4003/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  ai-frontend:
    build:
      context: ./apps/ai-frontend
      dockerfile: Dockerfile
    container_name: medseal-ai-frontend
    ports:
      - "3001:80"
    depends_on:
      ai-service:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - medseal-net

  cdss:
    build:
      context: ./apps/cdss
      dockerfile: Dockerfile
    container_name: medseal-cdss
    ports:
      - "3002:80"
    depends_on:
      ai-service:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - medseal-net

volumes:
  medplum-db-data:
  medplum-binary:
  openemr-db-data:
  openemr-sites:
  openemr-logs:
  audit-data:
  sso-db-data:


networks:
  medseal-net:
    driver: bridge

