server {
    listen 80;

    # ═══ SSO Cookie Gate ═══
    # Check for medseal_sso cookie — redirect to SSO login if missing
    set $sso_ok 0;
    if ($cookie_medseal_sso) {
        set $sso_ok 1;
    }

    # Enable sub_filter for injecting banner
    sub_filter_once on;
    sub_filter_types text/html;
    sub_filter '</head>' '
        <style>
            #medseal-bar {
                position: fixed; top: 0; left: 0; right: 0; z-index: 99999;
                height: 32px;
                background: rgba(255,255,255,0.95);
                backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
                border-bottom: 1px solid #e5e7eb;
                display: flex; align-items: center; justify-content: space-between;
                padding: 0 12px;
                font-family: Inter, system-ui, -apple-system, sans-serif;
                font-size: 12px;
            }
            #medseal-bar .ms-left { display: flex; align-items: center; gap: 6px; }
            #medseal-bar .ms-logo {
                width: 20px; height: 20px; border-radius: 5px;
                background: #0066cc; display: flex; align-items: center;
                justify-content: center; font-size: 10px; color: white;
            }
            #medseal-bar .ms-label { font-weight: 600; color: #111827; }
            #medseal-bar .ms-sep { color: #d1d5db; margin: 0 2px; }
            #medseal-bar .ms-svc { color: #4b5563; font-weight: 500; }
            #medseal-bar .ms-right { display: flex; align-items: center; gap: 10px; }
            #medseal-bar .ms-user {
                display: flex; align-items: center; gap: 5px; color: #6b7280;
            }
            #medseal-bar .ms-avatar {
                width: 18px; height: 18px; border-radius: 50%;
                background: #eff6ff; color: #0066cc;
                display: flex; align-items: center; justify-content: center;
                font-size: 9px; font-weight: 600;
            }
            #medseal-bar .ms-signout {
                padding: 2px 10px; border-radius: 5px;
                font-size: 11px; font-weight: 500;
                border: 1px solid #e5e7eb; background: white;
                color: #374151; cursor: pointer; font-family: inherit;
                transition: all 0.12s;
            }
            #medseal-bar .ms-signout:hover { background: #f9fafb; border-color: #d1d5db; }
            body { margin-top: 33px !important; }
        </style>
    </head>';

    sub_filter '</body>' '
        <div id="medseal-bar">
            <div class="ms-left">
                <div class="ms-logo">&#129516;</div>
                <span class="ms-label">Med-SEAL</span>
                <span class="ms-sep">›</span>
                <span class="ms-svc">Orthanc PACS</span>
            </div>
            <div class="ms-right">
                <div class="ms-user">
                    <div class="ms-avatar" id="msAvatar">A</div>
                    <span id="msUsername">Admin</span>
                </div>
                <button class="ms-signout" onclick="document.cookie=\'medseal_sso=; path=/; max-age=0\'; window.location.href=\'http://localhost:3001\'">Sign Out → SSO</button>
            </div>
        </div>
        <script>
            (function(){
                var c = document.cookie.match(/medseal_sso=([^;]+)/);
                if (c) {
                    var u = decodeURIComponent(c[1]);
                    var el = document.getElementById("msUsername");
                    var av = document.getElementById("msAvatar");
                    if (el) el.textContent = u.charAt(0).toUpperCase() + u.slice(1);
                    if (av) av.textContent = u.charAt(0).toUpperCase();
                }
            })();
        </script>
    </body>';

    # Proxy all requests to Orthanc with Basic Auth
    location / {
        # Enforce SSO cookie
        if ($sso_ok = 0) {
            return 302 http://localhost:3001;
        }

        proxy_pass http://orthanc:8042;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization "Basic YWRtaW46cGFzcw==";
        proxy_buffering off;
        proxy_request_buffering off;
        client_max_body_size 500M;
    }
}
