events {
    worker_connections 1024;
}

http {
    client_max_body_size 100M;
    resolver 127.0.0.11 valid=30s;

    # SSL Settings
    ssl_certificate /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # HTTP redirect to HTTPS (for direct access without Cloudflare)
    server {
        listen 80 default_server;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # HTTP server blocks for Cloudflare proxied domains
    # Cloudflare terminates SSL and sends HTTP to origin port 80
    server {
        listen 80;
        server_name app.med-seal.org;
        location / { set $upstream http://ai-frontend:80; proxy_pass $upstream; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto https; }
    }
    server {
        listen 80;
        server_name api.med-seal.org;
        location / {
            set $upstream http://ai-service:4003;
            proxy_pass $upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            # SSE streaming — disable all buffering
            proxy_buffering off;
            proxy_cache off;
            proxy_http_version 1.1;
            chunked_transfer_encoding off;
            add_header X-Accel-Buffering no;
            proxy_read_timeout 300s;
        }
    }
    server {
        listen 80;
        server_name cdss.med-seal.org;
        location / {
            set $upstream http://cdss:80;
            proxy_pass $upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            # SSE pass-through
            proxy_buffering off;
            proxy_cache off;
            proxy_http_version 1.1;
            chunked_transfer_encoding off;
            add_header X-Accel-Buffering no always;
            proxy_read_timeout 300s;
        }
    }
    server {
        listen 80;
        server_name emr.med-seal.org;
        location / { set $upstream http://openemr:80; proxy_pass $upstream; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto https; }
    }
    server {
        listen 80;
        server_name fhir.med-seal.org;
        location / { set $upstream http://medplum-server:8103; proxy_pass $upstream; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto https; }
    }
    server {
        listen 80;
        server_name medplum.med-seal.org;
        location / { set $upstream http://medplum-app:3000; proxy_pass $upstream; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto https; }
    }

    # AI Frontend (Patient App)
    server {
        listen 443 ssl;
        server_name app.med-seal.org;
        location / {
            set $upstream http://ai-frontend:80;
            proxy_pass $upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # OpenEMR
    server {
        listen 443 ssl;
        server_name emr.med-seal.org;
        location / {
            set $upstream http://openemr:80;
            proxy_pass $upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # Medplum API
    server {
        listen 443 ssl;
        server_name fhir.med-seal.org;
        location / {
            set $upstream http://medplum-server:8103;
            proxy_pass $upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # Medplum App
    server {
        listen 443 ssl;
        server_name medplum.med-seal.org;
        location / {
            set $upstream http://medplum-app:3000;
            proxy_pass $upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # AI Service API
    server {
        listen 443 ssl;
        server_name api.med-seal.org;
        location / {
            set $upstream http://ai-service:4003;
            proxy_pass $upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # SSE streaming — disable all buffering
            proxy_buffering off;
            proxy_cache off;
            proxy_http_version 1.1;
            chunked_transfer_encoding off;
            add_header X-Accel-Buffering no;
            proxy_read_timeout 300s;
            # Allow CORS from CDSS
            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Headers "Content-Type" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            if ($request_method = OPTIONS) { return 204; }
        }
    }

    # CDSS (Clinical Decision Support)
    server {
        listen 443 ssl;
        server_name cdss.med-seal.org;
        location / {
            set $upstream http://cdss:80;
            proxy_pass $upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

}
