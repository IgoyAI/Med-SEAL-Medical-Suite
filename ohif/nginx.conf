server {
    listen 80 default_server;
    listen [::]:80 default_server;

    # ═══ SSO Cookie Gate ═══
    set $sso_ok 0;
    if ($cookie_medseal_sso) {
        set $sso_ok 1;
    }

    # Inject Med-SEAL SSO banner + AI Report Widget into HTML pages
    sub_filter_once on;
    sub_filter_types text/html;
    sub_filter '</head>' '
        <style>
            #medseal-bar {
                position: fixed; top: 0; left: 0; right: 0; z-index: 99999;
                height: 40px;
                background: rgba(255,255,255,0.92);
                backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
                border-bottom: 1px solid #e5e7eb;
                display: flex; align-items: center; justify-content: space-between;
                padding: 0 16px;
                font-family: Inter, system-ui, -apple-system, sans-serif;
                font-size: 13px;
            }
            #medseal-bar .ms-left { display: flex; align-items: center; gap: 8px; }
            #medseal-bar .ms-logo {
                width: 24px; height: 24px; border-radius: 6px;
                background: #0066cc; display: flex; align-items: center;
                justify-content: center; font-size: 12px; color: white;
            }
            #medseal-bar .ms-label { font-weight: 600; color: #111827; }
            #medseal-bar .ms-sep { color: #d1d5db; margin: 0 4px; }
            #medseal-bar .ms-svc { color: #4b5563; font-weight: 500; }
            #medseal-bar .ms-right { display: flex; align-items: center; gap: 12px; }
            #medseal-bar .ms-user {
                display: flex; align-items: center; gap: 6px; color: #6b7280;
            }
            #medseal-bar .ms-avatar {
                width: 22px; height: 22px; border-radius: 50%;
                background: #eff6ff; color: #0066cc;
                display: flex; align-items: center; justify-content: center;
                font-size: 10px; font-weight: 600;
            }
            #medseal-bar .ms-signout {
                padding: 4px 12px; border-radius: 6px;
                font-size: 12px; font-weight: 500;
                border: 1px solid #e5e7eb; background: white;
                color: #374151; cursor: pointer; font-family: inherit;
                transition: all 0.12s;
            }
            #medseal-bar .ms-signout:hover { background: #f9fafb; border-color: #d1d5db; }
            body { padding-top: 40px !important; box-sizing: border-box !important; }
            #root, #ohif-viewer, .ohif-outer-container { 
                margin-top: 0 !important; 
                height: calc(100vh - 40px) !important; 
                max-height: calc(100vh - 40px) !important;
            }
        </style>
    </head>';

    sub_filter '</body>' '
        <div id="medseal-bar">
            <div class="ms-left">
                <div class="ms-logo">&#129516;</div>
                <span class="ms-label">Med-SEAL</span>
                <span class="ms-sep">›</span>
                <span class="ms-svc">OHIF Viewer</span>
            </div>
            <div class="ms-right">
                <div class="ms-user">
                    <div class="ms-avatar" id="msAvatar">A</div>
                    <span id="msUsername">Admin</span>
                </div>
                <button class="ms-signout" onclick="document.cookie=\'medseal_sso=; path=/; max-age=0\'; window.location.href=\'http://localhost:3001\'">Sign Out → SSO</button>
            </div>
        </div>
        <script>
            (function(){
                var c = document.cookie.match(/medseal_sso=([^;]+)/);
                if (c) {
                    var u = decodeURIComponent(c[1]);
                    var el = document.getElementById("msUsername");
                    var av = document.getElementById("msAvatar");
                    if (el) el.textContent = u.charAt(0).toUpperCase() + u.slice(1);
                    if (av) av.textContent = u.charAt(0).toUpperCase();
                }
            })();
        </script>
        <script src="/medseal-chat-panel.js?v=8"></script>
    </body>';

    # Proxy DICOMweb requests to Orthanc (no SSO gate — internal API)
    location /dicom-web/ {
        if ($sso_ok = 0) {
            return 302 http://localhost:3001;
        }
        proxy_pass http://orthanc:8042/dicom-web/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization "Basic YWRtaW46cGFzcw==";
        proxy_buffering off;
        proxy_request_buffering off;
        client_max_body_size 500M;
    }

    location /wado {
        if ($sso_ok = 0) {
            return 302 http://localhost:3001;
        }
        proxy_pass http://orthanc:8042/wado;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization "Basic YWRtaW46cGFzcw==";
        proxy_buffering off;
    }



    # Serve Med-SEAL Chat panel JS
    location /medseal-chat-panel.js {
        alias /usr/share/nginx/html/medseal-chat-panel.js;
        add_header Content-Type application/javascript;
        add_header Cache-Control 'no-cache, no-store, must-revalidate';
        add_header Pragma 'no-cache';
    }

    # Serve OHIF static files
    location / {
        # Enforce SSO cookie
        if ($sso_ok = 0) {
            return 302 http://localhost:3001;
        }

        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
